<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Case Study: Otimização de Controle de Almoxarifado com Excel e Power BI — diagnóstico, solução e resultados." />
  <meta name="author" content="Luciano Paiva" />
  <meta property="og:title" content="Case: Almoxarifado com Excel/BI — Luciano Paiva" />
  <meta property="og:description" content="Transformando dados de estoque em decisões operacionais." />
  <title>Case Study — Almoxarifado com Excel/BI · Luciano Paiva</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:           #f5ede4;
      --bg-warm:      #ede0d2;
      --surface:      #faf4ee;
      --surface-2:    #ede0d2;
      --border:       rgba(139,90,60,0.13);
      --border-2:     rgba(139,90,60,0.26);
      --text:         #2c1a12;
      --text-mid:     #5c3d2e;
      --muted:        #9b7b68;
      --accent:       #b5451b;
      --accent-dim:   rgba(181,69,27,0.09);
      --accent-hover: #9b3815;
      --burgundy:     #6e1c2e;
      --sand:         #c9a87c;
      --sand-dim:     rgba(201,168,124,0.18);
      --warm-red:     #c0392b;
      --warm-red-dim: rgba(192,57,43,0.11);

      --font-display: 'Cormorant Garamond', serif;
      --font-body:    'Inter', sans-serif;
      --font-mono:    'DM Mono', monospace;

      --r-sm: 4px;
      --r-md: 8px;
      --r-lg: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.7;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 47px, var(--border) 48px),
        repeating-linear-gradient(90deg, transparent, transparent 47px, var(--border) 48px);
      opacity: 0.45;
      pointer-events: none;
      z-index: 0;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg-warm); }
    ::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 3px; }

    h1, h2, h3, h4 { font-family: var(--font-display); font-weight: 600; line-height: 1.2; }
    code, .mono { font-family: var(--font-mono); }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(245,237,228,0.93);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-2);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      gap: 16px;
    }

    .nav-brand {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      gap: 20px;
      list-style: none;
      align-items: center;
      flex-wrap: nowrap;
    }

    .nav-links a {
      font-size: 10.5px;
      font-family: var(--font-mono);
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.2s;
      white-space: nowrap;
    }
    .nav-links a:hover { color: var(--accent); }

    .visit-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
    }
    .visit-badge span { color: var(--accent); font-weight: 500; }

    /* HERO */
    .hero { padding: 72px 0 52px; }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid var(--accent);
      padding: 4px 12px;
      border-radius: var(--r-sm);
      margin-bottom: 22px;
      opacity: 0;
      animation: fadeUp 0.6s 0.1s forwards;
    }
    .hero-eyebrow::before {
      content: '';
      width: 5px; height: 5px;
      background: var(--accent);
      border-radius: 50%;
    }

    .hero-author {
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--muted);
      margin-bottom: 12px;
      letter-spacing: 0.04em;
      opacity: 0;
      animation: fadeUp 0.6s 0.18s forwards;
    }

    /* TÍTULO SUAVE E MENOR */
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 3vw, 2.3rem);
      font-weight: 400;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 18px;
      max-width: 600px;
      letter-spacing: 0.01em;
      opacity: 0;
      animation: fadeUp 0.6s 0.25s forwards;
    }
    .hero-title em {
      font-style: italic;
      color: var(--accent);
    }

    .hero-subtitle {
      font-size: 14.5px;
      color: var(--text-mid);
      max-width: 490px;
      margin-bottom: 32px;
      line-height: 1.75;
      opacity: 0;
      animation: fadeUp 0.6s 0.32s forwards;
    }

    /* ACTION BUTTONS */
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-bottom: 26px;
      opacity: 0;
      animation: fadeUp 0.6s 0.38s forwards;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--r-md);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(181,69,27,0.25); }

    .btn-burgundy { background: var(--burgundy); color: #f5ede4; }
    .btn-burgundy:hover { background: #5a1625; transform: translateY(-1px); }

    .btn-outline { background: transparent; color: var(--text-mid); border: 1px solid var(--border-2); }
    .btn-outline:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    .btn-ghost { background: var(--surface-2); color: var(--text-mid); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    .btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      opacity: 0;
      animation: fadeUp 0.6s 0.44s forwards;
    }

    .meta-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 999px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--muted);
    }

    .meta-pill .dot { width: 5px; height: 5px; border-radius: 50%; }
    .dot-terra    { background: var(--accent); }
    .dot-sand     { background: var(--sand); }
    .dot-burgundy { background: var(--burgundy); }

    .note-banner {
      background: var(--sand-dim);
      border: 1px solid rgba(201,168,124,0.38);
      border-radius: var(--r-md);
      padding: 11px 16px;
      font-size: 11.5px;
      color: var(--text-mid);
